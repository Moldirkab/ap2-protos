syntax = "proto3";

package paymentpb;

option go_package = "github.com/aidynkabdykarimov/ap2-generated/paymentpb;paymentpb";

service PaymentService {
  rpc ProcessPayment(PaymentRequest) returns (PaymentResponse);
}

message PaymentRequest {
  string order_id = 1;
  int64 amount = 2;
}

message PaymentResponse {
  string payment_id = 1;
  string order_id = 2;
  string transaction_id = 3;
  int64 amount = 4;
  string status = 5;
}
